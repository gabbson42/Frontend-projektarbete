<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Shop Homepage - Start Bootstrap Template</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg">
            <div class="container px-4 px-lg-5 m-4">
                <a class="navbar-brand" href="index.html"><img src="assets/black-font.png" width="200" alt=""></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                        <li class="nav-item"><a class="nav-link active" aria-current="page" href="index.html">Home</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container mb-4 mt-4">
            <div class="row">
                <div class="col mb-2">
                    <div class="card h-80" id="chosen-product"></div>
                </div>
                <div class="col mb-2">
                    <header class="py-2 bg-kademina rounded mb-4" hidden="until-found" id="hiddenbox">
                        <div class="container px-1 px-lg-1 my-4">
                            <div class="text-center text-white" id="order-text">
                            </div>
                        </div>
                    </header>
                    <form id="purchaseForm">

                        <label for="name" class="form-label">Namn</label>
                        <input type="name" id="name" class="form-control mb-4" placeholder="John Doe" required>
                        <div id="nameError" class="invalid-feedback"></div>

                        <label for="number" class="form-label">Telefonnummer</label>
                        <input type="text" id="number" class="form-control mb-4" placeholder="T.ex. 0737004512" required>
                        <div id="phoneError" class="invalid-feedback"></div>

                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" class="form-control mb-4" placeholder="example@email.com" required>
                        <div id="emailError" class="invalid-feedback"></div>

                        <label for="street" class="form-label">Gata</label>
                        <input type="text" id="street" class="form-control mb-4" placeholder="Adressvägen 42" required>
                        <div id="streetError" class="invalid-feedback"></div>

                        <label for="postnumber" class="form-label">Postnummer</label>
                        <input type="text" id="postNumber" class="form-control mb-4" placeholder="123 45" required>
                        <div id="postError" class="invalid-feedback"></div>

                        <label for="region" class="form-label">Ort</label>
                        <input type="text" id="region" class="form-control mb-4" placeholder="Ortköping" required>
                        <div id="regionError" class="invalid-feedback"></div>

                        <button class="btn btn-outline-kademina mt-1" id="order">Lägg beställning</button>
                        
                    </form>
                </div>
            </div>
        </div>
        </section>
        <!-- Footer-->
        <footer class="py-5 bg-kademina">
            <div class="container"><p class="m-0 text-center text-white">Copyright &copy; Kademina 2026</p></div>
        </footer>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script src="js/scripts.js"></script>
    </body>
</html>
